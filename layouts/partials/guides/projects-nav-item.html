{{ $project := .project -}}
{{ $defaultId := .defaultId -}}
{{ $pageNum := .pageNum | default 1 -}}
<button type="button"
        class="pg-nav__item{{ if eq $project.id $defaultId }} pg-nav__item--active{{ end }}{{ if $project.practice }} pg-nav__item--practice{{ end }}"
        id="pg-nav-{{ $project.id }}"
        data-project-id="{{ $project.id }}"
        data-page="{{ $pageNum }}"
        role="tab"
        aria-selected="{{ if eq $project.id $defaultId }}true{{ else }}false{{ end }}"
        aria-controls="pg-panel-{{ $project.id }}">
  <svg class="pg-nav__arrow pg-icon pg-icon--arrow-left" width="20" height="20" aria-hidden="true">
    <path d="M12.5 5 7.5 10l5 5" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="pg-nav__content">
    <span class="pg-nav__logo" aria-hidden="true"></span>
    <span class="pg-nav__label">{{ $project.name }}</span>
    {{ if $project.verified }}
    <svg class="pg-icon pg-icon--verified" width="20" height="20" viewBox="0 0 20 20" aria-label="פרויקט מאומת">
      <circle cx="10" cy="10" r="8" fill="#fbbf24"/>
      <path d="m6.5 10 2.2 2.2L13.5 7.5" fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    {{ end }}
    {{ if $project.practice }}
    <svg class="pg-icon pg-icon--puzzle" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
      <path d="M8.5 2.5a1.5 1.5 0 0 1 3 0V4h1.5a1.5 1.5 0 0 1 0 3H11.5v1a1.5 1.5 0 0 1-3 0V7H7a1.5 1.5 0 0 1 0-3h1.5V2.5Z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <path d="M4 11.5a1.5 1.5 0 0 1 3 0V13h1a1.5 1.5 0 0 1 0 3H7v1.5a1.5 1.5 0 0 1-3 0V16H2.5a1.5 1.5 0 0 1 0-3H4v-1.5Z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
    {{ end }}
  </span>
</button>
